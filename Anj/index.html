<!Doctype HTML>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anj</title>
    <style>
        :root{
            --env-w: 420px; /* Increased width */
            --env-h: 280px; /* Increased height */
            --accent: #ff8fb1;         /* cute pink */
            --accent-2: #ffd1e6;       /* soft pink */
            --paper: #fffdfb;
            --shadow: rgba(20,20,30,0.12);
        }
        *{box-sizing: border-box}
        body{
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", system-ui, -apple-system, "Helvetica Neue", Arial;
            /* remove background-image and use a video element instead */
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
            overflow: hidden;
        }

        /* Background video: cover the viewport and sit behind content */
        #bg-video{
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
            pointer-events: none;
            filter: saturate(1.05) brightness(0.95);
        }

        .container{
            text-align: center;
            padding: 28px;
            position: relative;
            z-index: 2; /* ensure content sits above the video */
        }

        .floating-hearts {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 3;
        }

        .hint{
            color: #6b6b6b;
            margin-bottom: 18px;
            user-select: none;
            font-size: 14px;
        }

        .stage{
            perspective: 1200px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 18px;
        }
        /* Paimon + speech bubble (Genshin-inspired styling) */
        .paimon-wrap{
            position: absolute;
            z-index: 9;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            max-width: 260px;
            transform-style: preserve-3d;
            pointer-events: none;
        }
        .paimon{
            width: 96px;
            height: 140px;
            display: block;
            transform: translateZ(20px);
            user-select: none;
            pointer-events: none;
            margin-left: 350px;
        }

        .speech{
            position: absolute;
            left: calc(100% + 160px);
            top: 2px;
            background: linear-gradient(180deg, #f6fbff 0%, #eaf3ff 60%);
            border-radius: 14px;
            padding: 10px 14px;
            box-shadow: 0 12px 30px rgba(2,24,40,0.18), inset 0 1px 0 rgba(255,255,255,0.6);
            color: #032b44;
            font-size: 14px;
            line-height: 1.25;
            max-width: 260px;
            white-space: normal;
            border: 1px solid rgba(3,43,68,0.06);
            backdrop-filter: blur(4px);
        }

        /* small golden ornament like Genshin UI */
        .speech::before{
            content: "";
            position: absolute;
            right: 8px;
            top: -10px;
            width: 20px;
            height: 20px;
            border-radius: 4px;
            background: linear-gradient(180deg,#ffd7a8,#ffb86b);
            box-shadow: 0 6px 14px rgba(0,0,0,0.12);
            transform: rotate(18deg);
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.12));
        }

        /* soft triangular tail with subtle shadow */
        .speech::after{
            content: "";
            position: absolute;
            left: -10px;
            top: 14px;
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 10px 10px 10px 0;
            border-color: transparent #eaf3ff transparent transparent;
            filter: drop-shadow(0 6px 14px rgba(2,24,40,0.12));
        }

        /* responsive adjustments */
        @media (max-width: 520px){
            .stage{ flex-direction: column-reverse; gap: 10px; }
            .speech{
                left: 0;
                top: -56px;
                transform: translateX(0);
            }
            .paimon{ width: 84px; }
        }
        

        .envelope{
            width: var(--env-w);
            height: var(--env-h);
            position: relative;
            margin: 0 auto;
            cursor: pointer;
            transform-style: preserve-3d;
            transition: transform 320ms cubic-bezier(.2,.9,.3,1), box-shadow 220ms;
            will-change: transform;
            border-radius: 14px;
        }

        .envelope:hover{
            transform: translateY(-8px) rotateX(4deg);
            box-shadow: 0 20px 40px rgba(20,20,30,0.12);
        }

        .envelope .body{
            position: absolute;
            inset: 0;
            background: radial-gradient(1200px 400px at 10% 10%, rgba(255,140,180,0.06), transparent 10%),
                        linear-gradient(180deg,#fffefc,#fff7fb 60%);
            border-radius: 12px;
            box-shadow: 0 18px 38px var(--shadow);
            overflow: visible;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px;
        }

        .flap{
            position: absolute;
            top: -2%;
            left: 0;
            width: 100%;
            height: 64%;
            transform-origin: top center;
            background: linear-gradient(180deg,var(--accent-2),#fffefc);
            border-bottom-left-radius: 22px;
            border-bottom-right-radius: 22px;
            z-index: 6;
            transition: transform 620ms cubic-bezier(.2,.9,.3,1), box-shadow 220ms;
            box-shadow: 0 10px 22px rgba(0,0,0,0.08);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 28px;
        }

        .seal{
            position: absolute;
            left: 50%;
            top: 46%;
            transform: translate(-50%, -50%);
            width: 52px;
            height: 52px;
            background: radial-gradient(circle at 35% 30%, #fff6f9, #ffd8e6 45%, var(--accent) 100%);
            border-radius: 50%;
            box-shadow: 0 6px 18px rgba(0,0,0,0.12), inset 0 -6px 10px rgba(0,0,0,0.04);
            z-index: 7;
            display: flex;
            align-items: center;
            justify-content: center;
            transform-origin: center;
            transition: transform 420ms cubic-bezier(.2,.9,.3,1);
            font-size: 18px;
            color: white;
            pointer-events: none;
        }

        .seal::before{
            content: "❤";
            transform: scale(1.05);
            text-shadow: 0 1px 0 rgba(0,0,0,0.05);
        }

        /* Cute floating hearts */
        .heart {
            position: absolute;
            width: 20px;
            height: 20px;
            background: #ff8fb1;
            opacity: 0.8;
            border-radius: 50%;
            animation: float 5s infinite ease-in-out;
        }

        .heart:nth-child(1) {
            left: 10%;
            animation-delay: 0s;
        }

        .heart:nth-child(2) {
            left: 30%;
            animation-delay: 1s;
        }

        .heart:nth-child(3) {
            left: 50%;
            animation-delay: 2s;
        }

        .heart:nth-child(4) {
            left: 70%;
            animation-delay: 3s;
        }

        .heart:nth-child(5) {
            left: 90%;
            animation-delay: 4s;
        }

        @keyframes float {
            0% {
                transform: translateY(100%);
                opacity: 0;
            }
            50% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100%);
                opacity: 0;
            }
        }

        .fade-out {
            animation: fadeOut 1s forwards;
        }

        @keyframes fadeOut {
            0% {
                opacity: 1;
            }
            100% {
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    
    <video id="bg-video" autoplay muted loop playsinline preload="auto">
        <source src="Genshin1.mp4" type="video/mp4">
        
    </video>

    <div class="floating-hearts">
        <div class="heart"></div>
        <div class="heart"></div>
        <div class="heart"></div>
        <div class="heart"></div>
        <div class="heart"></div>
    </div>

    <div class="container">
        <div class="stage">
            <div class="paimon-wrap" aria-hidden="false">
                <img src="paimonflying.gif" alt="Paimon" class="paimon">
                <div class="speech" role="status">Traveler, my Master has a message for you. Please click the envelope! ^^</div>
            </div>
            <div class="envelope" id="envelope" tabindex="0" role="button" aria-pressed="false" aria-label="Open letter">
                <div class="flap" aria-hidden="true"></div>
                <div class="seal" aria-hidden="true"></div>
                <div class="body" aria-hidden="true"></div>
            </div>
        </div>
    </div>

    <script>
        (function(){
            const env = document.getElementById('envelope');

            function openEnvelope() {
                document.body.classList.add('fade-out');
                setTimeout(() => {
                    window.location.href = 'main.html';
                }, 1000); 
            }

            env.addEventListener('click', openEnvelope);
        })();
    </script>
</body>
</html>
